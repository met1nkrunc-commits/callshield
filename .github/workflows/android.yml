name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'shared/**'
      - '.github/workflows/android.yml'
      - 'gradlew'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log; RESULT=${PIPESTATUS[0]}; grep -E "^e:|error:|Unresolved|Caused by:" /tmp/build.log | head -40; exit $RESULT

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: callshield-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
