name: Android Build & Play Store

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'shared/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git rev-list --count works

      # ── 2. JDK ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      # ── 4. Keystore ────────────────────────────────────────────────────────
      - name: Create keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}" | base64 --decode > keystore/callshield-release.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << EOF
          STORE_FILE=keystore/callshield-release.jks
          STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # ── 5. Build release APK ───────────────────────────────────────────────
      - name: Build release APK
        run: |
          ./gradlew :app:assembleRelease \
            -PIPQS_API_KEY="${{ secrets.IPQS_API_KEY }}"

      # ── 6. Upload to Play Store (internal track) ───────────────────────────
      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.callshield.app
          releaseFiles: app/build/outputs/apk/release/*.apk
          track: internal
          status: completed
