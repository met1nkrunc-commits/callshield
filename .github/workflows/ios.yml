name: iOS Build Check

on:
  push:
    branches: [main]
    paths:
      - 'iosApp/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build-check:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Show Xcode version + available simulators ──────────────────────
      - name: Xcode info
        run: |
          xcodebuild -version
          xcrun simctl list devices available --json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)['devices']
          for runtime, devs in d.items():
              for dev in devs:
                  if 'iPhone' in dev['name']:
                      print(runtime, dev['name'])
          " | head -20

      # ── 3. Install XcodeGen ───────────────────────────────────────────────
      - name: Install XcodeGen
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
        run: brew install xcodegen

      # ── 4. Generate .xcodeproj ────────────────────────────────────────────
      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate --spec project.yml

      # ── 5. Build (compile only, no signing) ───────────────────────────────
      - name: Build iOS (compile check)
        working-directory: iosApp
        run: |
          xcodebuild build \
            -project Callshield.xcodeproj \
            -scheme Callshield \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO
