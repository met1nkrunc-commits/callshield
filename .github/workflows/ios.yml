name: iOS Build & TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'iosApp/**'
      - 'shared/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. JDK for Gradle ─────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. Build shared KMP XCFramework ───────────────────────────────────
      - name: Build Shared XCFramework
        run: ./gradlew :shared:assembleSharedReleaseXCFramework

      # ── 4. Install XcodeGen ───────────────────────────────────────────────
      - name: Install XcodeGen
        run: brew install xcodegen

      # ── 5. Generate .xcodeproj ────────────────────────────────────────────
      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate --spec project.yml

      # ── 6. Install Apple signing certificate ──────────────────────────────
      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      # ── 7. Install provisioning profile ───────────────────────────────────
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── 8. Build & Archive ────────────────────────────────────────────────
      - name: Build archive
        working-directory: iosApp
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project Callshield.xcodeproj \
            -scheme Callshield \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $RUNNER_TEMP/Callshield.xcarchive \
            DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
            CODE_SIGN_STYLE=Manual \
            | xcpretty

      # ── 9. Export IPA ─────────────────────────────────────────────────────
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Callshield.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      # ── 10. Upload to TestFlight ───────────────────────────────────────────
      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID:     ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID:  ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > $RUNNER_TEMP/AuthKey.p8
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ipa/Callshield.ipa" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key "$RUNNER_TEMP/AuthKey.p8"
