name: Release — Build & Publish

# Tetikleyici: git tag ile
# Kullanım: git tag v1.0.3 && git push origin v1.0.3
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout (full history for versionCode) ─────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. JDK ─────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 3. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      # ── 4. Keystore ────────────────────────────────────────────────────────
      - name: Create keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}" \
            | base64 --decode > keystore/callshield-release.jks

      - name: Create keystore.properties
        run: |
          cat > keystore.properties << 'EOF'
          STORE_FILE=keystore/callshield-release.jks
          STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      # ── 5. Build APK + AAB ─────────────────────────────────────────────────
      - name: Build release APK
        run: |
          ./gradlew :app:assembleRelease \
            -PIPQS_API_KEY="${{ secrets.IPQS_API_KEY }}"

      - name: Build release AAB (Samsung / Play hazırlığı)
        run: |
          ./gradlew :app:bundleRelease \
            -PIPQS_API_KEY="${{ secrets.IPQS_API_KEY }}"

      # ── 6. Tag sürüm numarasını çek ────────────────────────────────────────
      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # ── 7. GitHub Release + APK yükle ─────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Callshield ${{ steps.version.outputs.tag }}"
          body_path: CHANGELOG.md
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 8. Firebase App Distribution (beta test) ───────────────────────────
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId:              ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_CREDENTIALS }}
          groups:             beta-testers
          file:               app/build/outputs/apk/release/app-release.apk
          releaseNotesFile:   CHANGELOG.md
