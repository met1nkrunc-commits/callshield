name: Update Fraud Numbers

# Her Pazartesi 03:00 UTC'de otomatik çalışır.
# Elle tetiklemek için GitHub Actions → "Run workflow" kullanın.
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write  # fraud_numbers.json'a commit atabilmek için

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python kurulumu ─────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 3. Bağımlılıklar ──────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install requests beautifulsoup4

      # ── 4. Scraper çalıştır ───────────────────────────────────────────────
      - name: Run Şikayetvar scraper
        run: |
          python scripts/sikayetvar_scraper.py \
            --output fraud_numbers.json \
            --pages 3
        # Şikayetvar'a aşırı yük bindirmemek için pages=3 yeterli.
        # Daha kapsamlı tarama için --pages 10 yapılabilir.

      # ── 5. Değişiklik varsa commit at ─────────────────────────────────────
      - name: Commit updated fraud numbers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add fraud_numbers.json

          # Değişiklik yoksa commit atma
          if git diff --staged --quiet; then
            echo "Yeni numara bulunamadı, commit atlanıyor."
          else
            COUNT=$(git diff --staged --stat | grep -oP '\d+ insertion' | grep -oP '\d+' || echo "?")
            git commit -m "data: update fraud numbers from Şikayetvar (+${COUNT} lines)"
            git push
          fi

      # ── 6. Özet ───────────────────────────────────────────────────────────
      - name: Print summary
        run: |
          echo "### Fraud Numbers Güncelleme Özeti" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          TOTAL=$(python3 -c "import json; d=json.load(open('fraud_numbers.json')); print(len(d['numbers']))")
          echo "- Toplam numara sayısı: **${TOTAL}**" >> $GITHUB_STEP_SUMMARY
          echo "- Versiyon: $(python3 -c "import json; d=json.load(open('fraud_numbers.json')); print(d['version'])")" >> $GITHUB_STEP_SUMMARY
